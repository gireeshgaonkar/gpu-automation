apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-simulation
  labels:
    app: ai-training
spec:
  # STAFF TEST: If this toleration is missing, the pod will NEVER schedule on our GPU NodePool
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  
  containers:
    - name: cuda-container
      image: nvidia/cuda:12.0-base-ubuntu22.04
      command: ["sh", "-c", "echo 'Simulating GPU Workload...'; sleep 60"]
      resources:
        limits:
          nvidia.com/gpu: 1 # This triggers Karpenter

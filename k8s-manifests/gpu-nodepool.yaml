apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: gpu-spot-ai-research
  labels:
    tier: "staff-engineered"
    cost-center: "finops-optimized"
spec:
  weight: 100 
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: "node.kubernetes.io/instance-category"
          operator: In
          values: ["g", "p"]
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["g4dn", "g5", "p3"]
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      nodeClassRef:
        name: default-gpu
  
  # STAFF-LEVEL ADDITION: Advanced Disruption Management
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s # Rapid consolidation to save money
    expireAfter: 720h 
    budgets:
      - nodes: "10%" # Ensure at least 90% of pods stay alive during cost-optimization swaps
  
  limits:
    cpu: 100
    memory: 400Gi
    nvidia.com/gpu: 10
---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: gpu-on-demand-fallback
spec:
  weight: 10 
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: "node.kubernetes.io/instance-category"
          operator: In
          values: ["g", "p"]
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      nodeClassRef:
        name: default-gpu
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 0s # Kill immediately when pods move to Spot
  limits:
    cpu: 50
    memory: 200Gi
    nvidia.com/gpu: 4
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default-gpu
spec:
  amiFamily: AL2 # Amazon Linux 2 with NVIDIA drivers pre-installed
  role: "KarpenterNodeRole-${cluster_name}" # This matches the IAM role created in Terraform
  tags:
    CostCenter: "AI-Research"
    Project: "ScaleToZero"
    Environment: "Production"
    ManagedBy: "Karpenter"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${cluster_name}"
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/${cluster_name}: "owned"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        encrypted: true
